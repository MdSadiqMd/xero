name: Agent Harness Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *"
  pull_request:
    paths:
      - "client/src-tauri/src/runtime/agent_core/**"
      - "client/src-tauri/src/runtime/autonomous_tool_runtime/**"
      - "client/src-tauri/tests/agent_core_runtime.rs"
      - "client/src-tauri/Cargo.toml"
      - ".github/workflows/harness-evals.yml"

jobs:
  harness-evals:
    name: Harness quality gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: brew install protobuf
      - name: Run harness eval quality gate
        working-directory: client/src-tauri
        run: cargo run --bin xero-harness-evals -- --format markdown | tee harness-eval-report.md
      - name: Publish eval summary
        if: always()
        working-directory: client/src-tauri
        run: |
          if [ -f harness-eval-report.md ]; then
            cat harness-eval-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
